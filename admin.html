<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Follow Stocks</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #f5f5fa;
      --card:    #ffffff;
      --card2:   #f0f0f8;
      --border:  rgba(0,0,0,0.09);
      --border-h:rgba(0,0,0,0.16);
      --text:    #0f0f1a;
      --dim:     #55556a;
      --muted:   #9999b0;
      --green:   #0a9955;
      --red:     #d92d48;
      --amber:   #c47e00;
      --accent:  #5344e8;
    }
    body { background:var(--bg); color:var(--text); font-family:'Outfit',sans-serif; min-height:100vh; -webkit-font-smoothing:antialiased; }

    /* LOGIN */
    #login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; background:radial-gradient(ellipse at 50% 0%,rgba(97,83,245,.06) 0%,transparent 60%); }
    .login-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:40px 36px; width:360px; text-align:center; }
    .login-mark { width:44px; height:44px; background:var(--accent); border-radius:12px; display:inline-flex; align-items:center; justify-content:center; font-size:20px; font-weight:700; color:#fff; margin-bottom:18px; }
    .login-card h1 { font-size:20px; font-weight:600; letter-spacing:-.01em; margin-bottom:4px; }
    .login-card p  { font-size:13px; color:var(--dim); margin-bottom:28px; }
    .pwd-wrap { position:relative; margin-bottom:12px; }
    .pwd-wrap input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:12px 40px 12px 14px; color:var(--text); font-family:'Outfit',sans-serif; font-size:14px; outline:none; transition:border-color .15s; }
    .pwd-wrap input:focus { border-color:var(--accent); }
    .pwd-toggle { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--muted); display:flex; align-items:center; }
    .login-btn { width:100%; padding:12px; background:var(--accent); color:#fff; border:none; border-radius:10px; font-family:'Outfit',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:opacity .15s; }
    .login-btn:hover { opacity:.9; }
    .login-error { font-size:12px; color:var(--red); margin-top:10px; min-height:18px; }

    /* HEADER */
    #dashboard { display:none; min-height:100vh; }
    .admin-header { height:52px; display:flex; align-items:center; justify-content:space-between; padding:0 28px; background:rgba(255,255,255,.98); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; backdrop-filter:blur(20px); }
    .admin-brand { display:flex; align-items:center; gap:10px; font-size:14px; font-weight:600; }
    .admin-mark { width:26px; height:26px; background:var(--accent); border-radius:7px; display:grid; place-items:center; font-size:12px; font-weight:700; color:#fff; }
    .admin-badge { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.09em; color:var(--dim); background:rgba(0,0,0,.04); border:1px solid var(--border); padding:2px 8px; border-radius:99px; }
    .header-right { display:flex; align-items:center; gap:10px; }
    .logout-btn { font-size:12px; color:var(--dim); background:none; border:1px solid var(--border); border-radius:7px; padding:5px 12px; cursor:pointer; font-family:'Outfit',sans-serif; transition:all .15s; }
    .logout-btn:hover { color:var(--text); }
    a.back-link { font-size:12px; color:var(--dim); text-decoration:none; display:flex; align-items:center; gap:5px; transition:color .15s; }
    a.back-link:hover { color:var(--text); }

    /* LAYOUT */
    .admin-layout { display:flex; min-height:calc(100vh - 52px); }
    .sidebar { width:220px; flex-shrink:0; padding:20px 12px; border-right:1px solid var(--border); display:flex; flex-direction:column; gap:2px; }
    .sidebar-section { font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); padding:0 8px; margin:12px 0 6px; }
    .sidebar-section:first-child { margin-top:0; }
    .nav-item { display:flex; align-items:center; gap:9px; padding:9px 10px; border-radius:8px; border:none; background:transparent; color:var(--dim); font-family:'Outfit',sans-serif; font-size:13px; font-weight:500; cursor:pointer; width:100%; text-align:left; transition:all .15s; }
    .nav-item:hover { color:var(--text); background:rgba(0,0,0,.03); }
    .nav-item.active { color:var(--text); background:rgba(97,83,245,.10); }
    .content { flex:1; padding:28px; overflow-y:auto; }

    /* PAGE HEADER */
    .page-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
    .page-title { font-size:18px; font-weight:600; letter-spacing:-.01em; }
    .page-sub { font-size:13px; color:var(--muted); margin-top:2px; }

    /* BUTTONS */
    .btn { display:inline-flex; align-items:center; gap:6px; padding:9px 16px; border-radius:9px; font-family:'Outfit',sans-serif; font-size:13px; font-weight:500; cursor:pointer; border:none; transition:all .15s; }
    .btn-primary   { background:var(--accent); color:#fff; }
    .btn-primary:hover { opacity:.9; }
    .btn-secondary { background:var(--card2); border:1px solid var(--border); color:var(--dim); }
    .btn-secondary:hover { color:var(--text); border-color:var(--border-h); }
    .btn-danger    { background:rgba(217,45,72,.10); border:1px solid rgba(217,45,72,.22); color:var(--red); }
    .btn-danger:hover { background:rgba(217,45,72,.16); }
    .btn-sm   { padding:5px 11px; font-size:12px; border-radius:7px; }

    /* STATS */
    .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:24px; }
    .stat-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px 20px; }
    .stat-lbl { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.09em; color:var(--muted); margin-bottom:10px; }
    .stat-val { font-family:'JetBrains Mono',monospace; font-size:24px; font-weight:500; letter-spacing:-.02em; }
    .stat-sub { font-size:12px; color:var(--muted); margin-top:4px; }

    /* TABLE */
    .table-wrap { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
    table { width:100%; border-collapse:collapse; }
    thead tr { border-bottom:1px solid var(--border); }
    th { font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.09em; color:var(--muted); padding:12px 16px; text-align:left; white-space:nowrap; }
    tbody tr { border-bottom:1px solid var(--border); transition:background .12s; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:rgba(0,0,0,.02); }
    td { padding:13px 16px; font-size:13px; vertical-align:middle; }
    .td-mono { font-family:'JetBrains Mono',monospace; font-size:12.5px; }
    .td-dim  { color:var(--dim); }
    .td-actions { display:flex; gap:6px; justify-content:flex-end; }

    /* TAGS */
    .tag { display:inline-flex; align-items:center; padding:2px 8px; border-radius:5px; font-size:11px; font-weight:500; border:1px solid var(--border); background:rgba(0,0,0,.03); color:var(--dim); }
    .tag.green { background:rgba(10,153,85,.08); border-color:rgba(10,153,85,.22); color:var(--green); }
    .tag.amber { background:rgba(196,126,0,.08);  border-color:rgba(196,126,0,.22);  color:var(--amber); }

    /* MODAL */
    .modal-overlay { position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,.7); display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--card); border:1px solid var(--border-h); border-radius:16px; padding:28px; width:500px; max-height:90vh; overflow-y:auto; }
    .modal-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:22px; }
    .modal-title { font-size:16px; font-weight:600; }
    .modal-close { width:28px; height:28px; border-radius:7px; border:1px solid var(--border); background:transparent; color:var(--dim); cursor:pointer; display:grid; place-items:center; font-size:16px; transition:all .15s; }
    .modal-close:hover { color:var(--text); }

    /* FORM */
    .form-group { margin-bottom:16px; }
    .form-row   { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    label { display:block; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:6px; }
    input[type="text"], input[type="number"], input[type="date"], select {
      width:100%; background:var(--bg); border:1px solid var(--border); border-radius:9px;
      padding:10px 12px; color:var(--text); font-family:'Outfit',sans-serif; font-size:13.5px; outline:none; transition:border-color .15s; appearance:none;
    }
    input:focus, select:focus { border-color:var(--accent); }
    input::placeholder { color:var(--muted); }
    input:disabled { opacity:.5; }
    .input-with-btn { display:flex; gap:8px; }
    .input-with-btn input { flex:1; }
    .form-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:22px; padding-top:18px; border-top:1px solid var(--border); }

    .fetch-result { background:rgba(10,153,85,.06); border:1px solid rgba(10,153,85,.18); border-radius:8px; padding:10px 12px; margin-top:8px; font-size:12.5px; display:none; }
    .fetch-error  { background:rgba(217,45,72,.06);  border:1px solid rgba(217,45,72,.16);  border-radius:8px; padding:10px 12px; margin-top:8px; font-size:12.5px; color:var(--red); display:none; }

    /* TOAST */
    #toast { position:fixed; bottom:24px; right:24px; background:var(--card); border:1px solid var(--border-h); border-radius:10px; padding:12px 18px; font-size:13px; box-shadow:0 8px 32px rgba(0,0,0,.5); transform:translateY(80px); opacity:0; transition:all .3s; z-index:2000; display:flex; align-items:center; gap:8px; }
    #toast.show { transform:translateY(0); opacity:1; }
    #toast.success { border-color:rgba(15,224,122,.35); color:var(--green); }
    #toast.error   { border-color:rgba(255,61,88,.35);  color:var(--red); }

    .empty { text-align:center; padding:48px 20px; color:var(--muted); font-size:13px; }
    .empty p:first-child { font-size:15px; margin-bottom:6px; color:var(--dim); }
    .pos { color:var(--green); }
    .neg { color:var(--red); }
    select option { background:#ffffff; }

    /* HISTORICAL DATA */
    .hist-asset-selector {
      display:flex; align-items:center; gap:12px; margin-bottom:24px;
      background:var(--card); border:1px solid var(--border);
      border-radius:12px; padding:16px 20px;
    }
    .hist-asset-selector label { margin-bottom:0; white-space:nowrap; }
    .hist-asset-selector select { max-width:280px; }

    .hist-tabs {
      display:flex; gap:2px; margin-bottom:20px;
      background:var(--card2); border:1px solid var(--border);
      border-radius:10px; padding:4px; width:fit-content;
    }
    .hist-tab {
      padding:7px 16px; border-radius:7px; border:none;
      background:transparent; color:var(--dim);
      font-family:'Outfit',sans-serif; font-size:13px; font-weight:500;
      cursor:pointer; transition:all .15s;
    }
    .hist-tab:hover { color:var(--text); }
    .hist-tab.active { background:var(--card); color:var(--text); box-shadow:0 1px 3px rgba(0,0,0,.08); }

    /* Annual data grid */
    .annual-grid-wrap { overflow-x:auto; }

    .annual-grid {
      display:grid;
      min-width:900px;
    }

    .ag-header {
      display:contents;
    }

    .ag-row {
      display:contents;
    }

    .ag-cell {
      padding:9px 10px;
      border-bottom:1px solid var(--border);
      font-size:12.5px;
      display:flex; align-items:center;
    }

    .ag-cell.label {
      font-size:12px; color:var(--dim); font-weight:500;
      padding-left:0; background:var(--card2);
      position:sticky; left:0; z-index:1;
      border-right:1px solid var(--border);
    }

    .ag-cell.section-header {
      font-size:9px; font-weight:700; text-transform:uppercase;
      letter-spacing:.09em; color:var(--muted); background:var(--bg);
      border-bottom:1px solid var(--border);
      grid-column:1/-1; padding:10px 10px 6px;
    }

    .ag-input {
      width:100%; background:transparent; border:none; outline:none;
      font-family:'JetBrains Mono',monospace; font-size:12px;
      color:var(--text); text-align:right; padding:2px 4px;
      border-radius:4px; transition:background .15s;
    }
    .ag-input:focus { background:rgba(83,68,232,.07); }
    .ag-input::placeholder { color:var(--muted); }

    .ag-year-hdr {
      padding:10px; font-size:11px; font-weight:700;
      text-transform:uppercase; letter-spacing:.07em;
      color:var(--dim); text-align:center;
      border-bottom:2px solid var(--border);
      background:var(--card);
    }

    .year-col-hdr {
      padding:8px 10px; font-size:11px; font-weight:700;
      letter-spacing:.04em; color:var(--text); text-align:center;
      background:var(--card); border-bottom:2px solid var(--border);
      position:sticky; top:0;
    }

    /* Segments table */
    .seg-editor {
      background:var(--card); border:1px solid var(--border);
      border-radius:12px; overflow:hidden; margin-top:0;
    }

    .seg-row {
      display:grid;
      grid-template-columns:240px repeat(var(--seg-years,1),120px) 40px;
      border-bottom:1px solid var(--border);
    }
    .seg-row:last-child { border-bottom:none; }
    .seg-row.header { background:var(--card2); }

    .seg-cell {
      padding:10px 12px; font-size:12.5px;
      border-right:1px solid var(--border);
      display:flex; align-items:center;
    }
    .seg-cell:last-child { border-right:none; justify-content:center; }
    .seg-cell.header { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }

    .seg-name-input {
      width:100%; background:transparent; border:none; outline:none;
      font-family:'Outfit',sans-serif; font-size:12.5px; color:var(--text);
      padding:0;
    }
    .seg-val-input {
      width:100%; background:transparent; border:none; outline:none;
      font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text);
      text-align:right; padding:0;
    }
    .seg-val-input::placeholder, .seg-name-input::placeholder { color:var(--muted); }

    .add-seg-btn {
      display:flex; align-items:center; gap:6px;
      padding:10px 16px; font-size:12.5px; color:var(--dim);
      background:none; border:none; cursor:pointer;
      font-family:'Outfit',sans-serif; transition:color .15s;
      width:100%; border-top:1px solid var(--border);
    }
    .add-seg-btn:hover { color:var(--accent); }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-mark">F</div>
    <h1>Follow Stocks</h1>
    <p>Área de administração · acesso restrito</p>
    <div class="pwd-wrap">
      <input type="password" id="pwd-input" placeholder="Password de acesso" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="pwd-toggle" onclick="togglePwd()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <p class="login-error" id="login-error"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="admin-header">
    <div class="admin-brand">
      <div class="admin-mark">F</div>
      Follow Stocks
      <span class="admin-badge">Admin</span>
    </div>
    <div class="header-right">
      <a href="index.html" class="back-link">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        Ver site
      </a>
      <button class="logout-btn" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <div class="admin-layout">
    <nav class="sidebar">
      <div class="sidebar-section">Principal</div>
      <button class="nav-item active" onclick="showTab('overview',this)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="7" height="9" rx="1"/><rect x="15" y="12" width="7" height="9" rx="1"/><rect x="2" y="14" width="7" height="7" rx="1"/><rect x="15" y="3" width="7" height="7" rx="1"/></svg>
        Visão Geral
      </button>
      <div class="sidebar-section">Gestão</div>
      <button class="nav-item" onclick="showTab('assets',this)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/><circle cx="3" cy="18" r="1" fill="currentColor"/></svg>
        Ativos
      </button>
      <button class="nav-item" onclick="showTab('holdings',this)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
        Carteira
      </button>
      <button class="nav-item" onclick="showTab('historico',this)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Dados Históricos
      </button>
    </nav>

    <div class="content" id="tab-content">
      <div style="color:var(--muted);font-size:13px">A carregar...</div>
    </div>
  </div>
</div>

<!-- MODAL: ASSET -->
<div class="modal-overlay" id="asset-modal">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="asset-modal-title">Adicionar Ativo</div>
      <button class="modal-close" onclick="closeAssetModal()">&#xD7;</button>
    </div>
    <input type="hidden" id="asset-id">
    <div class="form-group">
      <label>Ticker Yahoo Finance *</label>
      <div class="input-with-btn">
        <input type="text" id="f-ticker" placeholder="ex: AAPL, VWCE.DE, BTC-USD" style="text-transform:uppercase">
        <button class="btn btn-secondary" onclick="verifyTicker()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Verificar
        </button>
      </div>
      <div class="fetch-result" id="fetch-result"></div>
      <div class="fetch-error"  id="fetch-error"></div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Nome *</label>
        <input type="text" id="f-name" placeholder="Apple Inc.">
      </div>
      <div class="form-group">
        <label>ISIN</label>
        <input type="text" id="f-isin" placeholder="US0378331005">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Setor</label>
        <select id="f-sector">
          <option value="">&#x2014; Selecionar &#x2014;</option>
          <option>Technology</option><option>Healthcare</option><option>Financials</option>
          <option>Consumer Discretionary</option><option>Consumer Staples</option>
          <option>Communication Services</option><option>Industrials</option>
          <option>Energy</option><option>Materials</option><option>Real Estate</option>
          <option>Utilities</option><option>Crypto</option><option>ETF</option><option>Outros</option>
        </select>
      </div>
      <div class="form-group">
        <label>Tipo</label>
        <select id="f-type">
          <option value="Stock">Stock</option><option value="ETF">ETF</option>
          <option value="Crypto">Crypto</option><option value="Bond">Bond</option><option value="Outro">Outro</option>
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeAssetModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveAsset()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        Guardar
      </button>
    </div>
  </div>
</div>

<!-- MODAL: HOLDING -->
<div class="modal-overlay" id="holding-modal">
  <div class="modal" style="width:420px">
    <div class="modal-hdr">
      <div class="modal-title" id="holding-modal-title">Editar Posição</div>
      <button class="modal-close" onclick="closeHoldingModal()">&#xD7;</button>
    </div>
    <input type="hidden" id="h-asset-id">
    <input type="hidden" id="h-holding-id">
    <div class="form-group">
      <label>Ativo</label>
      <input type="text" id="h-asset-name" disabled>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>N&#xBA; de A&#xe7;&#xf5;es *</label>
        <input type="number" id="h-shares" placeholder="0" min="0" step="0.0001">
      </div>
      <div class="form-group">
        <label>Pre&#xe7;o M&#xe9;dio de Compra (&#x20ac;) *</label>
        <input type="number" id="h-avg-price" placeholder="0.00" min="0" step="0.01">
      </div>
    </div>
    <div class="form-group">

/* REFRESH FUNDAMENTALS */
async function refreshFundamentals() {
  const btn = document.getElementById('refresh-btn');
  const progressDiv = document.getElementById('refresh-progress');
  const bar = document.getElementById('progress-bar');
  const txt = document.getElementById('progress-text');

  btn.disabled = true;
  btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> A atualizar...';
  progressDiv.style.display = 'block';
  bar.style.width = '5%';
  txt.textContent = 'A ligar ao servidor...';

  // Add spin animation
  if (!document.getElementById('spin-style')) {
    const s = document.createElement('style');
    s.id = 'spin-style';
    s.textContent = '@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}';
    document.head.appendChild(s);
  }

  try {
    // Simulate progress while waiting (the endpoint can take minutes for many assets)
    let pct = 5;
    const interval = setInterval(() => {
      if (pct < 90) {
        pct += Math.random() * 3;
        bar.style.width = Math.min(pct, 90) + '%';
        const done = Math.floor((pct / 100) * allAssets.length);
        txt.textContent = `A processar... ~${done}/${allAssets.length} ativos`;
      }
    }, 1500);

    const res = await fetch('/api/refresh-fundamentals');
    clearInterval(interval);

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const result = await res.json();

    bar.style.width = '100%';
    txt.textContent = `Conclu&#xed;do! ${result.updated} atualizados, ${result.skipped} ignorados (crypto/ETF)${result.errors?.length ? ', ' + result.errors.length + ' erros' : ''}.`;
    txt.style.color = 'var(--green)';

    toast('Fundamentais atualizados! ' + result.updated + ' ativos.', 'success');
    await loadData();

  } catch(err) {
    bar.style.width = '100%';
    bar.style.background = 'var(--red)';
    txt.textContent = 'Erro: ' + err.message;
    txt.style.color = 'var(--red)';
    toast('Erro ao atualizar: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Atualizar Fundamentais';
  }
}

async function selectHistAsset(id) {
  histAssetId = id || null;
  histData = {};
  histSegments = {};
  if (!id) { renderHistorico(); return; }

  // Load existing data from Supabase
  const [annRes, segRes] = await Promise.all([
    sb.from('asset_annual_data').select('*').eq('asset_id', id),
    sb.from('asset_segments').select('*').eq('asset_id', id).order('fiscal_year').order('sort_order'),
  ]);

  (annRes.data || []).forEach(row => {
    histData[row.fiscal_year] = row;
  });

  // Build segments structure: { year: [{name, revenue, sort_order}] }
  const segsRaw = segRes.data || [];
  const yearsWithSegs = [...new Set(segsRaw.map(s => s.fiscal_year))].sort((a,b)=>b-a);
  if (yearsWithSegs.length) segYears = yearsWithSegs.slice(0,3);

  segsRaw.forEach(s => {
    if (!histSegments[s.fiscal_year]) histSegments[s.fiscal_year] = [];
    histSegments[s.fiscal_year].push({ name: s.segment_name, revenue: s.revenue, sort_order: s.sort_order });
  });

  renderHistorico();
}

function buildAnnualTable(fields, section) {
  const cols = YEARS_LIST;
  const colW = 100;
  const labelW = 220;
  const totalW = labelW + cols.length * colW;

  let html = `<div class="annual-grid-wrap">
    <div class="annual-grid" style="grid-template-columns:${labelW}px repeat(${cols.length},${colW}px);width:${totalW}px;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden">
    <!-- Year headers -->
    <div style="padding:10px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);background:var(--card2);border-bottom:2px solid var(--border);border-right:1px solid var(--border)">M\xe9trica</div>
    ${cols.map(y => `<div style="padding:10px;font-size:12px;font-weight:700;color:var(--text);text-align:center;background:var(--card2);border-bottom:2px solid var(--border);border-right:1px solid var(--border)">${y}</div>`).join('')}`;

  fields.forEach((f, fi) => {
    const bg = fi % 2 === 0 ? 'var(--card)' : 'var(--bg)';
    html += `<div style="padding:9px 12px;font-size:12px;color:var(--dim);font-weight:500;background:var(--card2);border-bottom:1px solid var(--border);border-right:1px solid var(--border);display:flex;align-items:center;">${f.label}</div>`;
    cols.forEach(year => {
      const row = histData[year] || {};
      let val = row[f.key] != null ? row[f.key] : '';
      if (f.isPct && val !== '') val = (parseFloat(val) * 100).toFixed(2);
      html += `<div style="padding:4px 6px;background:${bg};border-bottom:1px solid var(--border);border-right:1px solid var(--border);">
        <input class="ag-input" type="number" step="any"
          data-year="${year}" data-field="${f.key}" data-pct="${f.isPct||false}"
          value="${val}" placeholder="—"
          oninput="setHistVal(${year},'${f.key}',this.value,${f.isPct||false})">
      </div>`;
    });
  });

  html += `</div></div>`;
  return html;
}

function buildSegmentEditor() {
  // Years selector for segments
  const availYears = YEARS_LIST.slice(0, 8);

        onchange="toggleSegYear(${y},this.checked)" style="width:auto;padding:0;border-radius:3px">
      ${y}
    </label>`
  ).join('');

  // Collect all unique segment names across years
  let allSegNames = [];
  segYears.forEach(y => {
    (histSegments[y] || []).forEach(s => {
      if (!allSegNames.includes(s.name)) allSegNames.push(s.name);
    });
  });
  if (allSegNames.length === 0) allSegNames = [''];

  const nYears = segYears.length;
  const colDef = `240px repeat(${nYears},130px) 40px`;

  let html = `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:12px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">

      ${segYearChecks}
    </div>

    <div class="seg-editor" style="--seg-years:${nYears}">
      <div class="seg-row header" style="grid-template-columns:${colDef}">
        <div class="seg-cell header">Segmento</div>
        ${segYears.map(y=>`<div class="seg-cell header" style="justify-content:center">${y}</div>`).join('')}
        <div class="seg-cell header"></div>
      </div>`;

  allSegNames.forEach((name, idx) => {
    html += `<div class="seg-row" style="grid-template-columns:${colDef}" data-seg-idx="${idx}">
      <div class="seg-cell">
        <input class="seg-name-input" type="text" value="${name}" placeholder="Nome do segmento"
          oninput="setSegName(${idx},this.value)">
      </div>`;
    segYears.forEach(year => {
      const segs = histSegments[year] || [];
      const s = segs.find(s => s.name === name);
      const val = s ? s.revenue : '';
      html += `<div class="seg-cell">
        <input class="seg-val-input" type="number" step="any" value="${val!==''?val:''}" placeholder="—"
          oninput="setSegVal('${name}',${year},this.value)">
      </div>`;
    });
    html += `<div class="seg-cell">
        <button onclick="removeSegRow(${idx})" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:0 4px" title="Remover">&times;</button>
      </div>
    </div>`;
  });

  html += `<button class="add-seg-btn" onclick="addSegRow()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Adicionar segmento
    </button>
  </div>`;

  return html;
}

function setHistVal(year, field, rawVal, isPct) {
  if (!histData[year]) histData[year] = {};
  if (rawVal === '' || rawVal == null) { histData[year][field] = null; return; }
  let val = parseFloat(rawVal);
  if (isNaN(val)) return;
  histData[year][field] = isPct ? val / 100 : val;
}

function toggleSegYear(year, checked) {
  if (checked && !segYears.includes(year)) {
    segYears = [...segYears, year].sort((a,b)=>b-a);
  } else if (!checked) {
    segYears = segYears.filter(y => y !== year);
  }
  document.getElementById('hist-body').innerHTML = buildHistBody();
}

function addSegRow() {
  segYears.forEach(y => {
    if (!histSegments[y]) histSegments[y] = [];
    histSegments[y].push({ name: '', revenue: null, sort_order: histSegments[y].length });
  });
  document.getElementById('hist-body').innerHTML = buildHistBody();
}

function removeSegRow(idx) {
  const nameEl = document.querySelectorAll('[data-seg-idx="'+idx+'"] .seg-name-input')[0];
  const name = nameEl ? nameEl.value : '';
  segYears.forEach(y => {
    if (histSegments[y]) histSegments[y] = histSegments[y].filter(s => s.name !== name);
  });
  document.getElementById('hist-body').innerHTML = buildHistBody();
}

function setSegName(idx, newName) {
  // Update name across all years
  segYears.forEach(y => {
    if (!histSegments[y]) histSegments[y] = [];
    if (!histSegments[y][idx]) histSegments[y][idx] = { name:'', revenue:null, sort_order:idx };
    histSegments[y][idx].name = newName;
  });
}

function setSegVal(segName, year, rawVal) {
  if (!histSegments[year]) histSegments[year] = [];
  let seg = histSegments[year].find(s => s.name === segName);
  if (!seg) { seg = { name:segName, revenue:null, sort_order:histSegments[year].length }; histSegments[year].push(seg); }
  seg.revenue = rawVal !== '' ? parseFloat(rawVal) : null;
}

async function saveHistorico() {
  if (!histAssetId) { toast('Seleciona um ativo primeiro', 'error'); return; }

  // Read all current input values from DOM before saving
  document.querySelectorAll('.ag-input').forEach(inp => {
    const year  = parseInt(inp.dataset.year);
    const field = inp.dataset.field;
    const isPct = inp.dataset.pct === 'true';
    const raw   = inp.value;
    setHistVal(year, field, raw, isPct);
  });
  document.querySelectorAll('[data-seg-idx]').forEach(row => {
    const idx     = parseInt(row.dataset.segIdx);
    const nameInp = row.querySelector('.seg-name-input');
    const name    = nameInp ? nameInp.value.trim() : '';
    if (!name) return;
    row.querySelectorAll('.seg-val-input').forEach((inp, i) => {
      const year = segYears[i];
      if (!year) return;
      setSegVal(name, year, inp.value);
    });
  });

  let errors = 0;

  // Upsert annual data
  for (const [yearStr, data] of Object.entries(histData)) {
    const year = parseInt(yearStr);
    const hasData = Object.entries(data).some(([k,v]) => v != null && k !== 'id' && k !== 'asset_id' && k !== 'fiscal_year' && k !== 'created_at' && k !== 'updated_at');
    if (!hasData) continue;

    const payload = { asset_id: histAssetId, fiscal_year: year, ...data };
    delete payload.id; delete payload.created_at; delete payload.updated_at;

    const { error } = await sb.from('asset_annual_data').upsert(payload, { onConflict: 'asset_id,fiscal_year' });
    if (error) { console.error(error); errors++; }
  }

  // Upsert segments
  for (const [yearStr, segs] of Object.entries(histSegments)) {
    const year = parseInt(yearStr);
    for (let i = 0; i < segs.length; i++) {
      const s = segs[i];
      if (!s.name) continue;
      const { error } = await sb.from('asset_segments').upsert({
        asset_id: histAssetId, fiscal_year: year,
        segment_name: s.name, revenue: s.revenue, sort_order: i
      }, { onConflict: 'asset_id,fiscal_year,segment_name' });
      if (error) { console.error(error); errors++; }
    }
  }

  if (errors === 0) toast('Dados guardados com sucesso!', 'success');
  else toast(errors + ' erro(s) ao guardar. Verifica a consola.', 'error');
}
function renderHoldings() {
  const hMap = {};
  allHoldings.forEach(h=>{ hMap[h.asset_id]=h; });
  const sorted = [...allAssets].sort((a,b)=>{
    const ha=hMap[a.id], hb=hMap[b.id];
    if(ha&&!hb) return -1; if(!ha&&hb) return 1;
    return a.name.localeCompare(b.name);
  });
  document.getElementById('tab-content').innerHTML = `
    <div class="page-hdr">
      <div><div class="page-title">Carteira</div><div class="page-sub">Define o n&#xba; de a&#xe7;&#xf5;es e pre&#xe7;o m&#xe9;dio para cada posi&#xe7;&#xe3;o</div></div>
    </div>
    <div class="table-wrap">
    ${sorted.length===0 ? `<div class="empty"><p>Nenhum ativo ainda</p><p>Adiciona ativos no separador "Ativos" primeiro</p></div>` : `
      <table>
        <thead><tr><th>Ticker</th><th>Nome</th><th>N&#xba; A&#xe7;&#xf5;es</th><th>Pre&#xe7;o M&#xe9;dio</th><th>&#xda;lt. Compra</th><th>Investido</th><th style="text-align:right">A&#xe7;&#xf5;es</th></tr></thead>
        <tbody>
        ${sorted.map(a=>{
          const h=hMap[a.id];
          const shares=h?+h.num_shares:0;
          const avg=h?+h.avg_price:0;
          const invested=shares*avg;
          const hasPos=h&&shares>0;
          return `<tr>
            <td><span class="td-mono" style="font-weight:600">${a.ticker}</span></td>
            <td>${a.name}</td>
            <td class="td-mono">${hasPos?fmtShares(shares):'<span class="td-dim">&#x2014;</span>'}</td>
            <td class="td-mono">${hasPos?fmt(avg,2)+' &#x20ac;':'<span class="td-dim">&#x2014;</span>'}</td>
            <td class="td-dim" style="font-size:12px">${h&&h.last_purchase_date?formatDate(h.last_purchase_date):'&#x2014;'}</td>
            <td class="td-mono">${hasPos?'<span class="pos">'+fmtBig(invested)+' &#x20ac;</span>':'<span class="td-dim">&#x2014;</span>'}</td>
            <td><div class="td-actions"><button class="btn btn-primary btn-sm" onclick="openHolding('${a.id}')">${hasPos?'Editar':'+ Posi&#xe7;&#xe3;o'}</button></div></td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>`}
    </div>`;
}

/* ASSET MODAL */
function openAddAsset() {
  ['asset-id','f-ticker','f-name','f-isin'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-sector').value=''; document.getElementById('f-type').value='Stock';
  document.getElementById('asset-modal-title').textContent='Adicionar Ativo';
  document.getElementById('fetch-result').style.display='none';
  document.getElementById('fetch-error').style.display='none';
  document.getElementById('asset-modal').classList.add('open');
}
function openEditAsset(id) {
  const a=allAssets.find(x=>x.id===id); if(!a) return;
  document.getElementById('asset-modal-title').textContent='Editar Ativo';
  document.getElementById('asset-id').value=a.id;
  document.getElementById('f-ticker').value=a.ticker;
  document.getElementById('f-name').value=a.name;
  document.getElementById('f-isin').value=a.isin||'';
  document.getElementById('f-sector').value=a.sector||'';
  document.getElementById('f-type').value=a.asset_type||'Stock';
  document.getElementById('fetch-result').style.display='none';
  document.getElementById('fetch-error').style.display='none';
  document.getElementById('asset-modal').classList.add('open');
}
function closeAssetModal() { document.getElementById('asset-modal').classList.remove('open'); }

async function verifyTicker() {
  const ticker=document.getElementById('f-ticker').value.trim().toUpperCase();
  document.getElementById('f-ticker').value=ticker;
  const rEl=document.getElementById('fetch-result'), eEl=document.getElementById('fetch-error');
  rEl.style.display='none'; eEl.style.display='none';
  if(!ticker){eEl.textContent='Introduz um ticker.';eEl.style.display='block';return;}
  try {
    const res=await fetch('/api/quote?symbols='+encodeURIComponent(ticker));
    const data=await res.json();
    const q=data.quoteResponse?.result?.[0];
    if(!q) throw new Error('Ticker n\xe3o encontrado no Finnhub');
    const name=q.shortName||q.longName||ticker;
    document.getElementById('f-name').value=name;
    rEl.innerHTML='&#x2713; <b>'+ticker+'</b> &mdash; '+name+' &middot; Pre\xe7o: '+(q.regularMarketPrice||'—');
    rEl.style.display='block';
  } catch(e) {
    eEl.textContent='Ticker n\xe3o encontrado. Para ETFs europeus usa o formato sem sufixo (ex: VWCE em vez de VWCE.DE).';
    eEl.style.display='block';
  }
}

async function saveAsset() {
  const id=document.getElementById('asset-id').value;
  const ticker=document.getElementById('f-ticker').value.trim().toUpperCase();
  const name=document.getElementById('f-name').value.trim();
  const isin=document.getElementById('f-isin').value.trim();
  const sector=document.getElementById('f-sector').value;
  const type=document.getElementById('f-type').value;
  if(!ticker||!name){toast('Ticker e Nome s&#xe3;o obrigat&#xf3;rios','error');return;}
  const payload={ticker,name,isin:isin||null,sector:sector||null,asset_type:type};
  let err;
  if(id){const r=await sb.from('assets').update(payload).eq('id',id);err=r.error;}
  else{const r=await sb.from('assets').insert(payload);err=r.error;}
  if(err){toast('Erro: '+err.message,'error');return;}
  closeAssetModal();
  toast(id?'Ativo atualizado!':'Ativo adicionado!','success');
  await loadData();
}

async function confirmDeleteAsset(id,ticker) {
  if(!confirm('Eliminar '+ticker+'?\nIsso vai remover a posicao e da watchlist.')) return;
  const{error}=await sb.from('assets').delete().eq('id',id);
  if(error){toast('Erro: '+error.message,'error');return;}
  toast(ticker+' eliminado','success');
  await loadData();
}

/* HOLDING MODAL */
function openHolding(assetId) {
  const a=allAssets.find(x=>x.id===assetId);
  const h=allHoldings.find(x=>x.asset_id===assetId);
  document.getElementById('holding-modal-title').textContent=(h?'Editar':'Nova posi\xe7\xe3o')+' \u2014 '+a.ticker;
  document.getElementById('h-asset-id').value=assetId;
  document.getElementById('h-holding-id').value=h?.id||'';
  document.getElementById('h-asset-name').value=a.ticker+' \u2014 '+a.name;
  document.getElementById('h-shares').value=h?.num_shares||'';
  document.getElementById('h-avg-price').value=h?.avg_price||'';
  document.getElementById('h-date').value=h?.last_purchase_date||'';
  document.getElementById('h-delete-btn').style.display=h?'inline-flex':'none';
  document.getElementById('holding-modal').classList.add('open');
}
function closeHoldingModal(){document.getElementById('holding-modal').classList.remove('open');}

async function saveHolding() {
  const assetId=document.getElementById('h-asset-id').value;
  const holdingId=document.getElementById('h-holding-id').value;
  const shares=parseFloat(document.getElementById('h-shares').value);
  const avgPrice=parseFloat(document.getElementById('h-avg-price').value);
  const date=document.getElementById('h-date').value||null;
  if(!shares||shares<=0){toast('N\xba de a\xe7\xf5es inv\xe1lido','error');return;}
  if(!avgPrice||avgPrice<=0){toast('Pre\xe7o m\xe9dio inv\xe1lido','error');return;}
  const payload={asset_id:assetId,num_shares:shares,avg_price:avgPrice,last_purchase_date:date,updated_at:new Date().toISOString()};
  let err;
  if(holdingId){const r=await sb.from('holdings').update(payload).eq('id',holdingId);err=r.error;}
  else{const r=await sb.from('holdings').insert(payload);err=r.error;}
  if(err){toast('Erro: '+err.message,'error');return;}
  closeHoldingModal();
  toast('Posi\xe7\xe3o guardada!','success');
  await loadData();
}

async function deleteHolding() {
  const holdingId=document.getElementById('h-holding-id').value;
  if(!holdingId) return;
  if(!confirm('Remover esta posi\xe7\xe3o da carteira?')) return;
  const{error}=await sb.from('holdings').delete().eq('id',holdingId);
  if(error){toast('Erro: '+error.message,'error');return;}
  closeHoldingModal();
  toast('Posi\xe7\xe3o removida','success');
  await loadData();
}

/* TOAST */
function toast(msg,type='success'){
  const el=document.getElementById('toast');
  el.textContent=(type==='success'?'\u2713  ':'\u2715  ')+msg;
  el.className='show '+type;
  clearTimeout(window._tt);
  window._tt=setTimeout(()=>el.classList.remove('show'),3000);
}

/* HELPERS */
function fmt(n,d=2){if(n==null||isNaN(n))return '\u2014';return n.toLocaleString('pt-PT',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtBig(n){if(n==null||isNaN(n))return '\u2014';const a=Math.abs(n);if(a>=1e9)return (n/1e9).toFixed(2)+' B';if(a>=1e6)return (n/1e6).toFixed(2)+' M';if(a>=1e3)return (n/1e3).toFixed(1)+' K';return n.toFixed(2);}
function fmtShares(n){return n%1===0?n.toFixed(0):n.toFixed(n<1?4:2);}
function formatDate(s){if(!s)return '\u2014';return new Date(s).toLocaleDateString('pt-PT');}

document.getElementById('asset-modal').addEventListener('click',function(e){if(e.target===this)closeAssetModal();});
document.getElementById('holding-modal').addEventListener('click',function(e){if(e.target===this)closeHoldingModal();});
</script>
