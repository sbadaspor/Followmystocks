  const payload={asset_id:assetId,num_shares:shares,avg_price:avgPrice,last_purchase_date:date,updated_at:new Date().toISOString()};
  let err;
  if(holdingId){const r=await sb.from('holdings').update(payload).eq('id',holdingId);err=r.error;}
  else{const r=await sb.from('holdings').insert(payload);err=r.error;}
  if(err){toast('Erro: '+err.message,'error');return;}
  closeHoldingModal();
  toast('Posi\xe7\xe3o guardada!','success');
  await loadData();
}

async function deleteHolding() {
  const holdingId=document.getElementById('h-holding-id').value;
  if(!holdingId) return;
  if(!confirm('Remover esta posi\xe7\xe3o da carteira?')) return;
  const{error}=await sb.from('holdings').delete().eq('id',holdingId);
  if(error){toast('Erro: '+error.message,'error');return;}
  closeHoldingModal();
  toast('Posi\xe7\xe3o removida','success');
  await loadData();
}

/* TOAST */
function toast(msg,type='success'){
  const el=document.getElementById('toast');
  el.textContent=(type==='success'?'\u2713  ':'\u2715  ')+msg;
  el.className='show '+type;
  clearTimeout(window._tt);
  window._tt=setTimeout(()=>el.classList.remove('show'),3000);
}

/* HELPERS */
function fmt(n,d=2){if(n==null||isNaN(n))return '\u2014';return n.toLocaleString('pt-PT',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtBig(n){if(n==null||isNaN(n))return '\u2014';const a=Math.abs(n);if(a>=1e9)return (n/1e9).toFixed(2)+' B';if(a>=1e6)return (n/1e6).toFixed(2)+' M';if(a>=1e3)return (n/1e3).toFixed(1)+' K';return n.toFixed(2);}
function fmtShares(n){return n%1===0?n.toFixed(0):n.toFixed(n<1?4:2);}
function formatDate(s){if(!s)return '\u2014';return new Date(s).toLocaleDateString('pt-PT');}

document.getElementById('asset-modal').addEventListener('click',function(e){if(e.target===this)closeAssetModal();});
document.getElementById('holding-modal').addEventListener('click',function(e){if(e.target===this)closeHoldingModal();});

/* ════════════════════════════════════════
   PDF EXPORT
   ════════════════════════════════════════ */
async function exportPDF() {
  if (!histAssetId) return;
  const asset = allAssets.find(a => a.id === histAssetId);
  if (!asset) return;

  const btn = document.getElementById('pdf-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'A gerar...'; }

  const allYears = YEARS_LIST.filter(y => {
    const d = histData[y];
    return d && Object.values(d).some(v => v != null && typeof v === 'number');
  }).sort((a,b) => b - a);

  // ── Helpers ────────────────────────────────────────────
  const fN = (v,d=2) => (v==null||isNaN(v)) ? '\u2014' : parseFloat(v).toFixed(d);
  const fP = v => (v==null||isNaN(v)) ? '\u2014' : (parseFloat(v)*100).toFixed(2)+'%';
  const fD = v => (v==null||isNaN(v)) ? '\u2014' : parseFloat(v).toFixed(2)+' $';
  const fB = v => { if(v==null||isNaN(v)) return '\u2014'; const a=Math.abs(parseFloat(v)); return a>=1000?(v/1000).toFixed(2)+' B $':parseFloat(v).toFixed(2)+' M $'; };

  function getV(key, yr) {
    const d = histData[yr]; if (!d) return null;
    if (d[key]!=null) return parseFloat(d[key]);
    if (key==='gross_margin' && d.revenue&&d.gross_profit!=null) return d.gross_profit/d.revenue;
    if (key==='op_margin'    && d.revenue&&d.op_income!=null)    return d.op_income/d.revenue;
    if (key==='net_margin'   && d.revenue&&d.net_income!=null)   return d.net_income/d.revenue;
    return null;
  }
  function cagrFn(key,n) {
    if (allYears.length<=n) return null;
    const e=getV(key,allYears[0]),s=getV(key,allYears[n]);
    if (e==null||s==null||s<=0||e<=0) return null;
    return Math.pow(e/s,1/n)-1;
  }
  function avgFn(key,n) {
    const vals=allYears.slice(0,n).map(y=>getV(key,y)).filter(v=>v!=null);
    return vals.length?vals.reduce((a,v)=>a+v,0)/vals.length:null;
  }
  function yoyFn(key) {
    if(allYears.length<2) return null;
    const c=getV(key,allYears[0]),p=getV(key,allYears[1]);
    if(c==null||p==null||p===0) return null;
    return (c-p)/Math.abs(p);
  }
  function fmtKey(key,v) {
    if(v==null) return '\u2014';
    const pct=['gross_margin','op_margin','net_margin','roic'];
    if(pct.includes(key)) return fP(v);
    if(['eps','dividends_per_share'].includes(key)) return fD(v);
    if(['current_ratio','lt_debt_capital','debt_equity'].includes(key)) return fN(v,2);
    if(key==='shares_outstanding') return fN(v,0)+' M';
    return fB(v);
  }
  function grSpan(v,invert=false) {
    if(v==null||isNaN(v)) return '<span style="color:#9ca3af">\u2014</span>';
    const pos=v>=0,good=invert?!pos:pos;
    return '<span style="color:'+(good?'#059669':'#dc2626')+';font-weight:700">'+(pos?'+':'')+(v*100).toFixed(2)+'%</span>';
  }

  // ── SVG Bar Chart ──────────────────────────────────────
  function svgBar(key, label, color='#6366f1', fmtFn=fB) {
    const cols = allYears.slice(0,12).reverse();
    const vals = cols.map(y => getV(key,y));
    const hasData = vals.some(v=>v!=null);
    if (!hasData) return '';
    const maxV = Math.max(...vals.filter(v=>v!=null).map(Math.abs));
    if (maxV === 0) return '';
    const W=480, H=140, PAD={t:20,r:10,b:36,l:52}, BW=Math.floor((W-PAD.l-PAD.r)/cols.length)-3;
    const plotH = H-PAD.t-PAD.b, plotW = W-PAD.l-PAD.r;
    const hasNeg = vals.some(v=>v!=null&&v<0);
    const minV = hasNeg ? Math.min(0,...vals.filter(v=>v!=null)) : 0;
    const range = maxV - minV || 1;
    const ys = v => PAD.t + plotH - plotH*(v-minV)/range;
    const zeroY = ys(0);

    let bars='', xLabels='', yLabels='';
    const nTicks=4;
    for(let i=0;i<=nTicks;i++){
      const val=minV+(maxV-minV)*i/nTicks;
      const y=ys(val);
      yLabels+=`<line x1="${PAD.l-4}" y1="${y}" x2="${W-PAD.r}" y2="${y}" stroke="#e5e7eb" stroke-width="0.8"/>`;
      const lbl=Math.abs(val)>=1000?(val/1000).toFixed(1)+'B':val.toFixed(1);
      yLabels+=`<text x="${PAD.l-7}" y="${y+4}" text-anchor="end" font-size="8" fill="#9ca3af">${lbl}</text>`;
    }
    cols.forEach((yr,i) => {
      const v = vals[i];
      const x = PAD.l + i*(BW+3);
      if(v!=null) {
        const bH = Math.abs(plotH*(v-0)/(range)||1);
        const by = v>=0 ? ys(v) : zeroY;
        const bColor = v>=0 ? color : '#ef4444';
        bars+=`<rect x="${x}" y="${by}" width="${BW}" height="${Math.abs(ys(0)-ys(v))}" fill="${bColor}" rx="2" opacity="0.85"/>`;
        // value label on top
        const lblY = v>=0?by-4:by+Math.abs(ys(0)-ys(v))+10;
        const lbl=Math.abs(v)>=1000?(v/1000).toFixed(1):v.toFixed(1);
        if(BW>20) bars+=`<text x="${x+BW/2}" y="${lblY}" text-anchor="middle" font-size="7" fill="${v>=0?color:'#ef4444'}" font-weight="600">${lbl}</text>`;
      }
      if(i%2===0||cols.length<=8) {
        xLabels+=`<text x="${x+BW/2}" y="${H-6}" text-anchor="middle" font-size="8" fill="#6b7280">${yr}</text>`;
      }
    });
    return `<div style="break-inside:avoid;margin-bottom:16px">
      <div style="font-size:10px;font-weight:700;color:#374151;margin-bottom:4px">${label}</div>
      <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="max-width:100%">
        ${yLabels}${bars}${xLabels}
        ${hasNeg?`<line x1="${PAD.l}" y1="${zeroY}" x2="${W-PAD.r}" y2="${zeroY}" stroke="#374151" stroke-width="1"/>`:''}
      </svg>
    </div>`;
  }

  // ── SVG Line Chart ─────────────────────────────────────
  function svgLine(series, label) {
    // series = [{key, label, color, fmtFn}]
    const cols = allYears.slice(0,12).reverse();
    const allVals = series.flatMap(s=>cols.map(y=>getV(s.key,y))).filter(v=>v!=null);
    if(!allVals.length) return '';
    const maxV=Math.max(...allVals), minV=Math.min(...allVals);
    const range = maxV-minV||0.01;
    const W=480,H=130,PAD={t:16,r:10,b:32,l:48};
    const plotH=H-PAD.t-PAD.b, plotW=W-PAD.l-PAD.r;
    const px=i=>PAD.l+i/(cols.length-1||1)*plotW;
    const py=v=>PAD.t+plotH-(v-minV)/range*plotH;

    let paths='', dots='', legend='', gridLines='';
    const nTicks=4;
    for(let i=0;i<=nTicks;i++){
      const v=minV+(maxV-minV)*i/nTicks;
      const y=py(v);
      gridLines+=`<line x1="${PAD.l}" y1="${y}" x2="${W-PAD.r}" y2="${y}" stroke="#f3f4f6" stroke-width="1"/>`;
      const lbl=v>=0.1&&v<=1?(v*100).toFixed(0)+'%':Math.abs(v)>=1000?(v/1000).toFixed(1)+'B':v.toFixed(1);
      gridLines+=`<text x="${PAD.l-5}" y="${y+3}" text-anchor="end" font-size="8" fill="#9ca3af">${lbl}</text>`;
    }
    let xLabels='';
    cols.forEach((yr,i)=>{
      if(i%2===0||cols.length<=8)
        xLabels+=`<text x="${px(i)}" y="${H-5}" text-anchor="middle" font-size="8" fill="#9ca3af">${yr}</text>`;
    });

    series.forEach(s=>{
      const pts=cols.map((yr,i)=>{const v=getV(s.key,yr);return v!=null?[px(i),py(v)]:null;});
      let d='',prev=null;
      pts.forEach(pt=>{
        if(pt){d+=(prev?'L':'M')+pt[0].toFixed(1)+','+pt[1].toFixed(1);prev=pt;}
        else{prev=null;}
      });
      if(d) paths+=`<path d="${d}" stroke="${s.color}" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>`;
      pts.forEach(pt=>{ if(pt) dots+=`<circle cx="${pt[0].toFixed(1)}" cy="${pt[1].toFixed(1)}" r="2.5" fill="${s.color}"/>`; });
      legend+=`<span style="display:inline-flex;align-items:center;gap:4px;margin-right:12px;font-size:8px;color:#374151"><span style="display:inline-block;width:12px;height:2px;background:${s.color};border-radius:1px"></span>${s.label}</span>`;
    });

    return `<div style="break-inside:avoid;margin-bottom:16px">
      <div style="font-size:10px;font-weight:700;color:#374151;margin-bottom:4px">${label}</div>
      <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="max-width:100%">
        ${gridLines}${paths}${dots}${xLabels}
      </svg>
      <div style="margin-top:2px">${legend}</div>
    </div>`;
  }

  // ── Data table ─────────────────────────────────────────
  const COLS10 = allYears.slice(0,10);
  function buildTable(fields) {
    let t = `<table style="width:100%;border-collapse:collapse;font-size:9px;margin-bottom:20px">
      <thead><tr style="background:#312e81;color:#fff">
        <th style="padding:6px 8px;text-align:left;min-width:130px;font-weight:700">M\xe9trica</th>
        ${COLS10.map(y=>`<th style="padding:6px 5px;text-align:right;font-weight:700">${y}</th>`).join('')}
        <th style="padding:6px 5px;text-align:right;border-left:1px solid #4338ca;font-weight:700;color:#a5b4fc">YoY</th>
        <th style="padding:6px 5px;text-align:right;font-weight:700;color:#a5b4fc">C3A</th>
        <th style="padding:6px 5px;text-align:right;font-weight:700;color:#a5b4fc">C5A</th>
        <th style="padding:6px 5px;text-align:right;font-weight:700;color:#a5b4fc">C10A</th>
      </tr></thead><tbody>`;
    fields.forEach((f,fi)=>{
      const bg=fi%2===0?'#fff':'#f8f7ff';
      t+=`<tr style="background:${bg}"><td style="padding:5px 8px;color:#374151;font-weight:600;border-bottom:1px solid #ede9fe">${f.label}</td>`;
      COLS10.forEach((yr,ci)=>{
        const v=getV(f.key,yr), vp=ci<COLS10.length-1?getV(f.key,COLS10[ci+1]):null;
        let gr='';
        if(v!=null&&vp!=null&&vp!==0){const g=(v-vp)/Math.abs(vp);const good=f.invert?g<=0:g>=0;gr='<br><span style="font-size:7.5px;color:'+(good?'#059669':'#dc2626')+';font-weight:700">'+(g>=0?'+':'')+(g*100).toFixed(1)+'%</span>';}
        t+=`<td style="padding:5px 5px;text-align:right;border-bottom:1px solid #ede9fe;font-family:monospace;font-size:9px">${fmtKey(f.key,v)}${gr}</td>`;
      });
      t+=`<td style="padding:5px 5px;text-align:right;border-bottom:1px solid #ede9fe;border-left:1px solid #ede9fe;font-family:monospace">${grSpan(yoyFn(f.key),f.invert)}</td>`;
      t+=`<td style="padding:5px 5px;text-align:right;border-bottom:1px solid #ede9fe;font-family:monospace">${grSpan(cagrFn(f.key,3),f.invert)}</td>`;
      t+=`<td style="padding:5px 5px;text-align:right;border-bottom:1px solid #ede9fe;font-family:monospace">${grSpan(cagrFn(f.key,5),f.invert)}</td>`;
      t+=`<td style="padding:5px 5px;text-align:right;border-bottom:1px solid #ede9fe;font-family:monospace">${grSpan(cagrFn(f.key,10),f.invert)}</td>`;
      t+='</tr>';
    });
    return t+'</tbody></table>';
  }

  const INCOME=[
    {key:'eps',               label:'EPS ($)',            invert:false},
    {key:'revenue',           label:'Receita Total',      invert:false},
    {key:'gross_profit',      label:'Receita Bruta',      invert:false},
    {key:'op_income',         label:'Rec. Operacional',   invert:false},
    {key:'net_income',        label:'Rec. L\xedquida',    invert:false},
    {key:'fcf',               label:'Free Cash Flow',     invert:false},
    {key:'ebitda',            label:'EBITDA',             invert:false},
    {key:'dividends_per_share',label:'Dividendo/A\xe7\xe3o',invert:false},
    {key:'shares_outstanding', label:'A\xe7\xf5es (M)',   invert:true},
  ];
  const RATIOS=[
    {key:'gross_margin',   label:'Gross Margin',      invert:false},
    {key:'op_margin',      label:'Op. Margin',        invert:false},
    {key:'net_margin',     label:'Net Margin',        invert:false},
    {key:'roic',           label:'ROIC',              invert:false},
    {key:'current_ratio',  label:'Current Ratio',     invert:false},
    {key:'lt_debt_capital',label:'LT Debt/Capital',   invert:true},
    {key:'debt_equity',    label:'Debt/Equity',       invert:true},
  ];

  // Intrinsic value
  const epsA3=avgFn('eps',3), revC3=cagrFn('revenue',3);
  const gPct=revC3?revC3*100:10;
  const VI=epsA3?epsA3*(8.5+2*gPct)*4.4/4.2:null;

  // Summary KPIs
  const ny=allYears[0];
  const kpis=[
    {l:'EPS ('+ny+')',     v:fD(getV('eps',ny))},
    {l:'Net Margin',       v:getV('net_margin',ny)!=null?fP(getV('net_margin',ny)):(getV('net_income',ny)&&getV('revenue',ny)?fP(getV('net_income',ny)/getV('revenue',ny)):'\u2014')},
    {l:'ROIC',             v:fP(getV('roic',ny))},
    {l:'CAGR Rec. 5A',    v:grSpan(cagrFn('revenue',5))},
    {l:'CAGR EPS 5A',     v:grSpan(cagrFn('eps',5))},
    {l:'Valor Intr\xednseco',v:VI?fN(VI,2)+' $':'\u2014'},
  ];

  // Segments
  const segData=Object.entries(histSegments||{}).sort(([a],[b])=>parseInt(b)-parseInt(a));
  let segHTML='';
  if(segData.length){
    const [segYr,segs]=segData[0];
    const total=segs.filter(s=>s.revenue>0).reduce((t,s)=>t+parseFloat(s.revenue||0),0);
    segHTML=`<div style="break-before:page">
      <div class="sec-hdr"><span class="sec-bar" style="background:#8b5cf6"></span>Receita por Segmento ${segYr}</div>
      <table style="width:100%;border-collapse:collapse;font-size:9px;margin-bottom:16px">
        <thead><tr style="background:#4c1d95;color:#fff">
          <th style="padding:6px 8px;text-align:left">Segmento</th>
          <th style="padding:6px 8px;text-align:right">Receita</th>
          <th style="padding:6px 8px;text-align:right">% Total</th>
          <th style="padding:6px 8px;text-align:left">Visual</th>
        </tr></thead><tbody>
        ${segs.map((s,i)=>{
          const v=parseFloat(s.revenue||0);
          const pct=v>0&&total>0?(v/total*100).toFixed(1)+'%':'—';
          const barW=v>0&&total>0?Math.round(v/total*120):0;
          return `<tr style="background:${i%2===0?'#fff':'#faf5ff'}">
            <td style="padding:6px 8px;border-bottom:1px solid #ede9fe;font-weight:600;color:#374151">${s.name}</td>
            <td style="padding:6px 8px;text-align:right;border-bottom:1px solid #ede9fe;font-family:monospace">${fB(v)}</td>
            <td style="padding:6px 8px;text-align:right;border-bottom:1px solid #ede9fe">${pct}</td>
            <td style="padding:6px 8px;border-bottom:1px solid #ede9fe">
              <div style="height:8px;background:#e9d5ff;border-radius:4px;overflow:hidden">
                <div style="height:100%;width:${barW}px;background:#7c3aed;border-radius:4px"></div>
              </div>
            </td>
          </tr>`;
        }).join('')}
      </tbody></table>
    </div>`;
  }

  const today=new Date().toLocaleDateString('pt-PT',{day:'numeric',month:'long',year:'numeric'});

  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Helvetica Neue',Arial,sans-serif;font-size:10px;color:#111;background:#fff}
  @page{size:A4;margin:14mm 12mm 12mm 12mm}
  @media print{
    .pg-break{break-before:page}
    body{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
  .sec-hdr{font-size:13px;font-weight:800;color:#1e1b4b;margin:18px 0 8px;display:flex;align-items:center;gap:8px;padding-bottom:5px;border-bottom:2px solid #e0e7ff}
  .sec-bar{display:inline-block;width:4px;height:16px;border-radius:2px;flex-shrink:0}
  .kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
  .kpi{background:#f5f3ff;border:1px solid #ddd6fe;border-radius:8px;padding:10px 12px}
  .kpi-l{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#7c3aed;margin-bottom:4px}
  .kpi-v{font-size:16px;font-weight:800;color:#1e1b4b;font-family:monospace}
  .chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
</style>
</head><body>

<!-- ═══ COVER ═══════════════════════════════════════════ -->
<div style="background:linear-gradient(135deg,#1e1b4b 0%,#3730a3 50%,#6366f1 100%);color:#fff;padding:32px 28px 28px;border-radius:10px;margin-bottom:22px;position:relative;overflow:hidden">
  <div style="position:absolute;right:-30px;top:-30px;width:180px;height:180px;background:rgba(255,255,255,.06);border-radius:50%"></div>
  <div style="position:absolute;right:40px;top:50px;width:90px;height:90px;background:rgba(255,255,255,.04);border-radius:50%"></div>
  <div style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:3px;color:#a5b4fc;margin-bottom:10px">Follow Stocks \xb7 Relat\xf3rio de An\xe1lise</div>
  <div style="font-size:48px;font-weight:900;letter-spacing:-2px;line-height:1">${asset.ticker}</div>
  <div style="font-size:20px;color:#c7d2fe;margin-top:4px;font-weight:500">${asset.name}</div>
  <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">
    ${asset.sector?`<span style="background:rgba(255,255,255,.15);backdrop-filter:blur(4px);padding:3px 10px;border-radius:99px;font-size:9px;font-weight:700;letter-spacing:.5px">${asset.sector}</span>`:''}
    ${asset.asset_type?`<span style="background:rgba(255,255,255,.15);padding:3px 10px;border-radius:99px;font-size:9px;font-weight:700;letter-spacing:.5px">${asset.asset_type}</span>`:''}
    <span style="background:rgba(255,255,255,.15);padding:3px 10px;border-radius:99px;font-size:9px;font-weight:700">${allYears.length} anos de dados (${allYears[allYears.length-1]}\u2013${allYears[0]})</span>
  </div>
  <div style="position:absolute;right:24px;bottom:20px;font-size:9px;color:#818cf8;font-weight:500">${today}</div>
</div>

<!-- ═══ KPI SUMMARY ══════════════════════════════════════ -->
<div class="kpi-grid">
  ${kpis.map(k=>`<div class="kpi"><div class="kpi-l">${k.l}</div><div class="kpi-v">${k.v}</div></div>`).join('')}
</div>

<!-- ═══ INTRINSIC VALUE ══════════════════════════════════ -->
${VI!=null?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
  <div style="background:linear-gradient(135deg,#eef2ff,#ddd6fe);border:1px solid #c7d2fe;border-radius:10px;padding:14px 18px">
    <div style="font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:#4338ca;margin-bottom:8px">&#9733; Valor Intr\xednseco · Graham</div>
    <div style="font-size:26px;font-weight:900;color:#1e1b4b;font-family:monospace">${fN(VI,2)} $</div>
    <div style="margin-top:8px;font-size:9px;color:#6366f1;line-height:1.6">
      V = L \xd7 (8,5 + 2g) \xd7 4,4 / Y<br>
      L = ${fN(epsA3,2)}$ (EPS m\xe9d 3A) \xb7 g = ${fN(gPct,2)}% (CAGR rec. 3A) \xb7 Y = 4,2%
    </div>
  </div>
  <div style="background:linear-gradient(135deg,#ecfdf5,#d1fae5);border:1px solid #6ee7b7;border-radius:10px;padding:14px 18px">
    <div style="font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:#059669;margin-bottom:8px">&#128737; Com Margem de Seguran\xe7a \u221215%</div>
    <div style="font-size:26px;font-weight:900;color:#064e3b;font-family:monospace">${fN(VI*0.85,2)} $</div>
    <div style="margin-top:8px;font-size:9px;color:#10b981;line-height:1.6">
      ${fN(VI,2)} \xd7 0,85 = ${fN(VI*0.85,2)} $<br>
      Desconto de seguran\xe7a de 15% aplicado
    </div>
  </div>
</div>`:''}

<!-- ═══ CHARTS ════════════════════════════════════════════ -->
<div class="sec-hdr"><span class="sec-bar" style="background:#6366f1"></span>Gr\xe1ficos Hist\xf3ricos</div>
<div class="chart-grid">
  ${svgBar('revenue','Receita Total','#6366f1')}
  ${svgBar('eps','EPS por A\xe7\xe3o','#0ea5e9',fD)}
</div>
<div class="chart-grid">
  ${svgBar('net_income','Receita L\xedquida','#10b981')}
  ${svgBar('fcf','Free Cash Flow','#f59e0b')}
</div>
${svgLine([
  {key:'op_margin',   label:'Op. Margin',  color:'#6366f1'},
  {key:'net_margin',  label:'Net Margin',  color:'#10b981'},
  {key:'gross_margin',label:'Gross Margin',color:'#f59e0b'},
],'Margens ao Longo dos Anos')}
<div class="chart-grid">
  ${svgLine([{key:'roic',label:'ROIC',color:'#8b5cf6'}],'ROIC')}
  ${svgBar('dividends_per_share','Dividendos por A\xe7\xe3o','#ec4899',fD)}
</div>

<!-- ═══ INCOME TABLE ════════════════════════════════════ -->
<div class="pg-break">
<div class="sec-hdr"><span class="sec-bar" style="background:#6366f1"></span>Dados Gerais</div>
${buildTable(INCOME)}

<!-- ═══ RATIOS TABLE ════════════════════════════════════ -->
<div class="sec-hdr"><span class="sec-bar" style="background:#8b5cf6"></span>R\xe1cios e Margens</div>
${buildTable(RATIOS)}
</div>

${segHTML}

<!-- ═══ FOOTER ═══════════════════════════════════════════ -->
<div style="margin-top:24px;padding-top:10px;border-top:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center">
  <div style="font-size:8px;color:#9ca3af;font-weight:600">Follow Stocks \xb7 ${today}</div>
  <div style="font-size:8px;color:#9ca3af">Dados para fins informativos. N\xe3o constitui aconselhamento financeiro.</div>
</div>

</body></html>`;

  const win = window.open('','_blank','width=1000,height=900');
  win.document.write(html);
  win.document.close();
  win.onload = () => setTimeout(()=>{ win.focus(); win.print(); }, 500);

  if(btn){ btn.disabled=false; btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Exportar PDF'; }
  toast('Relat\xf3rio pronto! Escolhe "Guardar como PDF" na janela de impress\xe3o.','success');
}

/* ═══ EARNINGS CALENDAR ══════════════════════════════════════ */
let earningsAssetId = null;
let earningsData    = [];

async function renderEarnings() {
  const tc = document.getElementById('tab-content');
  tc.innerHTML = `
    <div class="page-hdr">
      <div>
        <div class="page-title">Calendário de Resultados</div>
        <div class="page-sub">Datas de apresentação de resultados trimestrais e anuais por ativo</div>
      </div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:20px">
      <label style="font-size:12px;font-weight:600;color:var(--dim);display:block;margin-bottom:8px">Ativo</label>
      <select id="earn-asset-sel" onchange="loadEarnings(this.value)"
        style="background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:9px 14px;font-family:'Outfit',sans-serif;font-size:13px;color:var(--text);width:280px;outline:none;cursor:pointer">
        <option value="">— Selecionar ativo —</option>
        ${allAssets.map(a=>`<option value="${a.id}">${a.ticker} — ${a.name}</option>`).join('')}
      </select>
    </div>
    <div id="earn-panel"></div>`;
  if (earningsAssetId) {
    document.getElementById('earn-asset-sel').value = earningsAssetId;
    await loadEarnings(earningsAssetId);
  }
}

async function loadEarnings(assetId) {
  earningsAssetId = assetId;
  const panel = document.getElementById('earn-panel');
  if (!assetId) { panel.innerHTML=''; return; }
  panel.innerHTML = `<div style="color:var(--muted);font-size:13px;padding:12px 0">A carregar...</div>`;
  const { data } = await sb.from('earnings_calendar').select('*').eq('asset_id', assetId).order('sort_order').order('event_date', { nullsFirst: false });
  earningsData = data || [];
  renderEarningsPanel();
}

function renderEarningsPanel() {
  const panel = document.getElementById('earn-panel');
  if (!earningsAssetId) return;

  const today = new Date(); today.setHours(0,0,0,0);
  let nextIdx = -1;
  earningsData.forEach((e,i)=>{
    if(!e.event_date) return;
    const d = new Date(e.event_date+'T00:00:00');
    if(d >= today && nextIdx === -1) nextIdx = i;
  });

  const rows = earningsData.map((e,i)=>{
    const isPast = e.event_date && new Date(e.event_date+'T00:00:00') < today;
    const isNext = i === nextIdx;
    const dateStr = e.event_date
      ? new Date(e.event_date+'T00:00:00').toLocaleDateString('pt-PT',{day:'numeric',month:'long',year:'numeric'})
      : '—';
    return `<tr>
      <td style="font-weight:500">${e.label}</td>
      <td class="td-mono" style="color:${isNext?'var(--accent)':isPast?'var(--muted)':'var(--text)'}">${dateStr}</td>
      <td><span style="font-size:11px;color:var(--muted);font-style:italic">${e.note||''}</span></td>
      <td>${e.is_estimate
        ? `<span class="tag" style="color:var(--amber);border-color:rgba(196,126,0,.25)">Estimado</span>`
        : `<span class="tag" style="color:var(--green);border-color:rgba(10,153,85,.25)">Confirmado</span>`}</td>
      <td class="td-mono td-dim">${e.sort_order}</td>
      <td>
        <div class="td-actions">
          <button class="btn btn-secondary btn-sm" onclick="openEarnModal(${i})">Editar</button>
          <button class="btn btn-danger btn-sm" onclick="deleteEarn('${e.id}')">Apagar</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  panel.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="font-size:13px;color:var(--muted)">${earningsData.length} evento(s) registado(s)</div>
      <button class="btn btn-primary" onclick="openEarnModal(-1)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Adicionar Evento
      </button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Evento</th><th>Data</th><th>Nota</th><th>Estado</th><th>Ordem</th><th style="text-align:right">Ações</th>
        </tr></thead>
        <tbody>${rows || `<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:28px">Nenhum evento. Clica em "Adicionar Evento".</td></tr>`}</tbody>
      </table>
    </div>`;
}

function openEarnModal(idx) {
  const e = idx >= 0 ? earningsData[idx] : null;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.style.display = 'flex';
  overlay.id = 'earn-modal';
  overlay.innerHTML = `
    <div class="modal" style="max-width:480px">
      <div class="modal-hdr">
        <div class="modal-title">${e ? 'Editar Evento' : 'Adicionar Evento'}</div>
        <button class="modal-close" onclick="closeEarnModal()">&#xD7;</button>
      </div>
      <input type="hidden" id="earn-id" value="${e?e.id:''}">
      <div class="form-group">
        <label>Descrição *</label>
        <input type="text" id="earn-label" placeholder="ex: 2º Trimestre Fiscal 2026" value="${e?e.label.replace(/"/g,'&quot;'):''}">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Data</label>
          <input type="date" id="earn-date" value="${e&&e.event_date?e.event_date:''}">
        </div>
        <div class="form-group">
          <label>Ordem de exibição</label>
          <input type="number" id="earn-order" value="${e?e.sort_order:earningsData.length}" min="0">
        </div>
      </div>
      <div class="form-group">
        <label>Nota <span style="font-weight:400;color:var(--muted)">(ex: após fecho do mercado)</span></label>
        <input type="text" id="earn-note" placeholder="ex: após fecho do mercado" value="${e&&e.note?e.note.replace(/"/g,'&quot;'):''}">
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
          <input type="checkbox" id="earn-est" ${e&&e.is_estimate?'checked':''} style="width:15px;height:15px;cursor:pointer;accent-color:var(--accent)">
          Data estimada (ainda não confirmada)
        </label>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
        <button class="btn btn-secondary" onclick="closeEarnModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveEarn()">Guardar</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function closeEarnModal() {
  const m = document.getElementById('earn-modal');
  if (m) m.remove();
}

async function saveEarn() {
  const id    = document.getElementById('earn-id').value;
  const label = document.getElementById('earn-label').value.trim();
  const date  = document.getElementById('earn-date').value || null;
  const note  = document.getElementById('earn-note').value.trim() || null;
  const est   = document.getElementById('earn-est').checked;
  const order = parseInt(document.getElementById('earn-order').value) || 0;

  if (!label) { toast('Preenche a descrição do evento.','error'); return; }

  const payload = { asset_id: earningsAssetId, label, event_date: date, note, is_estimate: est, sort_order: order };

  let err;
  if (id) {
    ({ error: err } = await sb.from('earnings_calendar').update(payload).eq('id', id));
  } else {
    ({ error: err } = await sb.from('earnings_calendar').insert(payload));
  }

  if (err) { toast('Erro: ' + err.message, 'error'); return; }
  toast(id ? 'Evento atualizado!' : 'Evento adicionado!', 'success');
  closeEarnModal();
  await loadEarnings(earningsAssetId);
}

async function deleteEarn(id) {
  if (!confirm('Apagar este evento do calendário?')) return;
  const { error } = await sb.from('earnings_calendar').delete().eq('id', id);
  if (error) { toast('Erro: ' + error.message, 'error'); return; }
  toast('Evento apagado.', 'success');
  await loadEarnings(earningsAssetId);
}

</script>
</body>
</html>
